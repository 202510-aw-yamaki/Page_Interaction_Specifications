<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>関係図整理ツール</title>
  <style>
    :root {
      --bg: #f8f6f1;
      --paper: #ffffff;
      --paper-soft: #fffaf3;
      --line: #e6e0d6;
      --text: #1f2937;
      --muted: #6b7280;
      --orange: #fb6f1f;
      --orange-soft: #fff3e8;
      --blue: #2577d2;
      --blue-soft: #eef6ff;
      --green: #2f9d52;
      --green-soft: #eefaf1;
      --purple: #7c4fd6;
      --purple-soft: #f5efff;
      --pink: #e64ea4;
      --pink-soft: #fff0f8;
      --shadow: 0 18px 45px rgba(35, 31, 27, 0.08);
      --shadow-soft: 0 8px 20px rgba(35, 31, 27, 0.08);
      --radius: 18px;
      --font: "Yu Gothic", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 4%, rgba(251, 111, 31, 0.08), transparent 28%),
        radial-gradient(circle at 92% 8%, rgba(37, 119, 210, 0.08), transparent 30%),
        linear-gradient(180deg, #fbfaf7 0%, var(--bg) 100%);
      font-family: var(--font);
      overflow: hidden;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .app {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .logo {
      width: 44px;
      height: 44px;
      display: inline-grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #ff8b38, #fb6418);
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(251, 111, 31, 0.24);
      flex: 0 0 auto;
    }

    .logo svg,
    .mini-icon svg,
    .card-icon svg,
    .node-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .top-shell {
      height: 100%;
      display: grid;
      grid-template-rows: 92px 1fr 48px;
      overflow: hidden;
    }

    .top-header,
    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 28px;
      background: rgba(255, 255, 255, 0.82);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 260px;
    }

    .brand-title {
      margin: 0;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .top-actions,
    .toolbar,
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 10px 16px;
      color: #253244;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 11px;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.7) inset;
      font-weight: 800;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: #d4cabe;
      box-shadow: var(--shadow-soft);
    }

    .btn.primary-orange {
      color: #fff;
      background: linear-gradient(135deg, #ff892d, #fb6819);
      border-color: transparent;
    }

    .btn.primary-blue {
      color: #fff;
      background: linear-gradient(135deg, #3489e7, #1f6fcb);
      border-color: transparent;
    }

    .btn.primary-green {
      color: #fff;
      background: linear-gradient(135deg, #42b866, #2e984e);
      border-color: transparent;
    }

    .btn.ghost-orange {
      color: var(--orange);
      background: var(--orange-soft);
      border-color: #ffd7bf;
    }

    .btn.ghost-blue {
      color: var(--blue);
      background: var(--blue-soft);
      border-color: #cce3ff;
    }

    .btn.ghost-green {
      color: var(--green);
      background: var(--green-soft);
      border-color: #cdeed5;
    }

    .btn.ghost-purple {
      color: var(--purple);
      background: var(--purple-soft);
      border-color: #dfd1ff;
    }

    .btn.ghost-pink {
      color: var(--pink);
      background: var(--pink-soft);
      border-color: #ffd0e9;
    }

    .btn.small {
      min-height: 34px;
      padding: 7px 10px;
      font-size: 12px;
      border-radius: 9px;
    }

    .btn.icon-only {
      width: 38px;
      min-width: 38px;
      padding: 7px;
    }

    .mini-icon {
      width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .top-main {
      padding: 32px 54px 24px;
      overflow: auto;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(420px, 1fr) minmax(460px, 0.92fr);
      align-items: center;
      gap: 40px;
      margin-bottom: 22px;
    }

    .hero h2 {
      margin: 0 0 18px;
      font-size: clamp(38px, 4.2vw, 58px);
      line-height: 1.13;
      letter-spacing: -0.06em;
    }

    .hero p {
      margin: 0;
      color: #4f5b6c;
      font-size: 20px;
      line-height: 1.9;
      letter-spacing: 0.02em;
    }

    .hero-visual {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid #eee6da;
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .visual-panel {
      min-height: 162px;
      position: relative;
      padding: 18px;
      border-radius: 14px;
      overflow: hidden;
    }

    .visual-panel h3 {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 16px;
      font-size: 15px;
    }

    .visual-panel.orange {
      color: var(--orange);
      background: var(--orange-soft);
      border: 1px solid #ffcda9;
    }

    .visual-panel.blue {
      color: var(--blue);
      background: var(--blue-soft);
      border: 1px solid #b8d9ff;
    }

    .visual-panel.green {
      color: var(--green);
      background: var(--green-soft);
      border: 1px solid #bde8ca;
    }

    .mini-map {
      height: 96px;
      position: relative;
    }

    .mini-box {
      position: absolute;
      width: 42px;
      height: 18px;
      border: 2px solid currentColor;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.85);
      opacity: 0.72;
    }

    .mini-box.root {
      left: calc(50% - 21px);
      top: 4px;
    }

    .mini-box.a {
      left: 12px;
      top: 64px;
    }

    .mini-box.b {
      left: calc(50% - 21px);
      top: 64px;
    }

    .mini-box.c {
      right: 12px;
      top: 64px;
    }

    .mini-lines {
      position: absolute;
      inset: 0;
      color: currentColor;
      opacity: 0.8;
    }

    .start-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(260px, 1fr));
      gap: 24px;
      margin: 0 0 26px;
    }

    .start-card {
      position: relative;
      min-height: 302px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 26px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .start-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.8), transparent 55%);
      pointer-events: none;
    }

    .start-card > * {
      position: relative;
      z-index: 1;
    }

    .start-card.orange {
      border-color: #ffc9a8;
    }

    .start-card.blue {
      border-color: #bddcff;
    }

    .start-card.green {
      border-color: #bfe9ca;
    }

    .start-head {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.35;
    }

    .step-number {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      color: #fff;
      border-radius: 50%;
      font-size: 20px;
      flex: 0 0 auto;
    }

    .orange .step-number {
      background: var(--orange);
    }

    .blue .step-number {
      background: var(--blue);
    }

    .green .step-number {
      background: var(--green);
    }

    .start-body {
      display: grid;
      grid-template-columns: 88px 1fr;
      align-items: center;
      gap: 18px;
      color: #4f5b6c;
      line-height: 1.9;
      font-size: 16px;
      flex: 1;
    }

    .card-icon {
      width: 78px;
      height: 78px;
      display: grid;
      place-items: center;
      padding: 18px;
      border-radius: 50%;
    }

    .orange .card-icon {
      color: var(--orange);
      background: #fff1e7;
    }

    .blue .card-icon {
      color: var(--blue);
      background: #eaf4ff;
    }

    .green .card-icon {
      color: var(--green);
      background: #eaf8ee;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      background: #f4f0ea;
      color: #555;
    }

    .tag.orange {
      color: var(--orange);
      background: #fff1e7;
      border: 1px solid #ffd6ba;
    }

    .tag.blue {
      color: var(--blue);
      background: #edf6ff;
      border: 1px solid #cfe6ff;
    }

    .tag.green {
      color: var(--green);
      background: #effaf2;
      border: 1px solid #d3efd9;
    }

    .tag.purple {
      color: var(--purple);
      background: #f2edff;
      border: 1px solid #dfd2ff;
    }

    .flow-card {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 24px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
    }

    .flow-steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      align-items: start;
      gap: 18px;
    }

    .flow-step {
      position: relative;
      padding: 0 16px 0 72px;
      min-height: 88px;
    }

    .flow-step:not(:last-child)::after {
      content: "";
      position: absolute;
      top: 26px;
      left: calc(100% - 18px);
      width: 42px;
      border-top: 2px dashed currentColor;
      opacity: 0.72;
    }

    .flow-mark {
      position: absolute;
      left: 0;
      top: 0;
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #fff;
      border: 1px solid currentColor;
    }

    .flow-step h3 {
      margin: 7px 0 8px;
      font-size: 15px;
      font-weight: 900;
    }

    .flow-step p,
    .recommend-card li {
      margin: 0;
      color: #5c6675;
      line-height: 1.7;
      font-size: 13px;
    }

    .recommend-card {
      padding: 18px 22px;
      background: #fff6ec;
      border-radius: 14px;
    }

    .recommend-card h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .recommend-card ul {
      margin: 0;
      padding-left: 22px;
    }

    .top-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 56px;
      color: #7a8493;
      font-size: 13px;
    }

    .editor-shell {
      width: 100vw;
      max-width: 100vw;
      height: 100%;
      display: grid;
      grid-template-rows: 76px 1fr 40px;
      background: #fbfaf7;
      overflow: hidden;
    }

    .editor-header {
      padding: 10px 22px;
      gap: 20px;
    }

    .editor-header .brand-title {
      font-size: 26px;
    }

    .toolbar {
      flex: 1;
      justify-content: flex-start;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 2px;
      scrollbar-width: thin;
      flex-wrap: nowrap;
    }

    .toolbar-group {
      padding: 4px;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid var(--line);
      border-radius: 13px;
      box-shadow: 0 6px 20px rgba(31, 41, 55, 0.04);
      flex-wrap: nowrap;
      flex: 0 0 auto;
    }

    .stage-badge {
      min-width: 250px;
      align-self: stretch;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    .stage-badge small {
      display: block;
      color: #5f6b7a;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 5px;
    }

    .stage-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 66px;
      height: 30px;
      color: #fff;
      border-radius: 7px;
      font-weight: 900;
      letter-spacing: 0.03em;
    }

    .stage-1 .stage-label {
      background: var(--orange);
    }

    .stage-2 .stage-label {
      background: var(--blue);
    }

    .stage-3 .stage-label {
      background: var(--orange);
    }

    .stage-title {
      font-weight: 900;
      color: var(--orange);
    }

    .stage-2 .stage-title {
      color: var(--blue);
    }

    .stage-3 .stage-title {
      color: var(--orange);
    }

    .editor-main {
      width: 100%;
      min-height: 0;
      position: relative;
      display: grid;
      grid-template-columns: 252px minmax(0, 1fr);
      gap: 12px;
      padding: 10px 364px 10px 12px;
      overflow: hidden;
    }

    .side-panel,
    .right-panel,
    .canvas-panel {
      min-width: 0;
      min-height: 0;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 8px 22px rgba(31, 41, 55, 0.05);
      overflow: hidden;
    }

    .side-panel,
    .right-panel {
      display: flex;
      flex-direction: column;
    }

    .right-panel {
      position: fixed;
      top: 86px;
      right: 12px;
      bottom: 50px;
      width: 340px;
      z-index: 30;
    }

    .panel-scroll {
      min-height: 0;
      overflow: auto;
      padding: 16px;
    }

    .panel-title {
      margin: 0 0 2px;
      font-size: 17px;
      font-weight: 900;
    }

    .panel-caption {
      margin: 0 0 16px;
      color: #6b7280;
      font-size: 12px;
      line-height: 1.6;
    }

    .tool-list {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .tool-btn {
      width: 100%;
      min-height: 58px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-weight: 900;
      text-align: left;
    }

    .tool-btn.orange {
      color: var(--orange);
      background: var(--orange-soft);
      border-color: #ffc9a8;
    }

    .tool-btn.blue {
      color: var(--blue);
      background: var(--blue-soft);
      border-color: #b8d9ff;
    }

    .tool-btn.green {
      color: var(--green);
      background: var(--green-soft);
      border-color: #bfe9ca;
    }

    .tool-btn.purple {
      color: var(--purple);
      background: var(--purple-soft);
      border-color: #decfff;
    }

    .tool-btn.active {
      outline: 3px solid rgba(124, 79, 214, 0.18);
      box-shadow: 0 8px 20px rgba(124, 79, 214, 0.11);
    }

    .tool-btn .mini-icon {
      width: 28px;
      height: 28px;
    }

    .tool-card {
      margin-top: 14px;
      padding: 14px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    .tool-card h3 {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 900;
    }

    .tool-card p,
    .tool-card li {
      margin: 0;
      color: #5f6b7a;
      font-size: 12px;
      line-height: 1.65;
    }

    .tool-card ul {
      margin: 0;
      padding-left: 18px;
    }

    .zoom-box {
      display: grid;
      grid-template-columns: 36px 1fr 36px 36px;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }

    .zoom-value {
      text-align: center;
      font-weight: 900;
    }

    .canvas-panel {
      position: relative;
      background:
        linear-gradient(90deg, rgba(230, 224, 214, 0.38) 1px, transparent 1px),
        linear-gradient(180deg, rgba(230, 224, 214, 0.38) 1px, transparent 1px),
        #fffdf9;
      background-size: 28px 28px;
    }

    .canvas-viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
      cursor: default;
    }

    .canvas-viewport.panning {
      cursor: grab;
    }

    .workspace {
      position: absolute;
      left: 0;
      top: 0;
      width: 1440px;
      height: 840px;
      transform-origin: 0 0;
    }

    .area {
      position: absolute;
      border-radius: 18px;
      border: 1.5px dashed currentColor;
      background: rgba(255, 255, 255, 0.52);
      overflow: hidden;
    }

    .area.publicArea {
      color: var(--orange);
      background: rgba(255, 243, 232, 0.55);
    }

    .area.adminArea {
      color: var(--blue);
      background: rgba(238, 246, 255, 0.58);
    }

    .area.dbArea {
      color: var(--green);
      background: rgba(238, 250, 241, 0.72);
    }

    .area-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 20px 24px 10px;
      pointer-events: none;
    }

    .area-header .mini-icon {
      width: 34px;
      height: 34px;
      margin-top: 2px;
    }

    .area-header h2 {
      margin: 0;
      color: currentColor;
      font-size: 24px;
      font-weight: 900;
    }

    .area-header p {
      margin: 6px 0 0;
      color: #6b7280;
      font-size: 13px;
      font-weight: 700;
    }

    .locked-area {
      position: absolute;
      inset: 88px 22px 22px;
      display: grid;
      place-items: center;
      text-align: center;
      color: #748092;
      pointer-events: none;
    }

    .locked-area-inner {
      max-width: 280px;
    }

    .locked-area .lock {
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      margin: 0 auto 16px;
      color: #6c7b8f;
      background: rgba(221, 232, 245, 0.75);
      border: 1px solid #cfdeee;
      border-radius: 50%;
    }

    .locked-area strong {
      display: block;
      margin-bottom: 10px;
      font-size: 22px;
      font-weight: 900;
    }

    .db-group {
      position: absolute;
      border: 1px solid #b7e4c3;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.66);
      color: var(--green);
      pointer-events: none;
    }

    .db-group h3 {
      margin: 0;
      padding: 12px 16px 4px 42px;
      color: var(--green);
      font-size: 17px;
      font-weight: 900;
    }

    .db-group p {
      margin: 0;
      padding: 0 16px 12px 42px;
      color: #6b7280;
      font-size: 12px;
      font-weight: 700;
    }

    .db-group::before {
      content: "";
      position: absolute;
      left: 15px;
      top: 13px;
      width: 18px;
      height: 22px;
      border: 2px solid currentColor;
      border-radius: 50% / 18%;
      box-shadow: 0 7px 0 -2px currentColor;
      opacity: 0.9;
    }

    .edge-svg {
      position: absolute;
      inset: 0;
      width: 1440px;
      height: 840px;
      overflow: visible;
      pointer-events: none;
      z-index: 4;
    }

    .edge-hit {
      pointer-events: stroke;
      fill: none;
      stroke: transparent;
      stroke-width: 18;
      cursor: pointer;
    }

    .edge-line {
      fill: none;
      stroke-width: 3;
      pointer-events: none;
    }

    .edge-line.navigate {
      stroke: var(--purple);
    }

    .edge-line.save {
      stroke: var(--orange);
    }

    .edge-line.reference {
      stroke: var(--blue);
    }

    .edge-line.selected {
      stroke-width: 5;
      filter: drop-shadow(0 2px 4px rgba(31, 41, 55, 0.24));
    }

    .edge-label {
      fill: #263142;
      font-size: 12px;
      font-weight: 900;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 4px;
      pointer-events: none;
    }

    .node {
      position: absolute;
      z-index: 6;
      min-width: 160px;

      const icon = stage === 1 ? "globe" : stage === 2 ? "lock" : "db";
      return `
        <article class="start-card ${color}">
          <div class="start-head"><span class="step-number">${stage}</span><span>${title}</span></div>
          <div class="start-body">
            <div class="card-icon">${svgIcon(icon)}</div>
            <div>
              <p>${body}</p>
              <div class="tag-list">${tags.map((tag) => `<span class="tag ${tag === "JavaScript" || tag === "CSS" ? "purple" : color}">${tag}</span>`).join("")}</div>
            </div>
          </div>
          <button class="btn primary-${color}" data-action="start-stage" data-stage="${stage}">この段階から始める <span aria-hidden="true">›</span></button>
        </article>
      `;
    }

    function renderFlowStep(color, title, text, icon) {
      return `
        <div class="flow-step" style="color: var(--${color});">
          <div class="flow-mark">${svgIcon(icon)}</div>
          <h3>${title}</h3>
          <p>${text}</p>
        </div>
      `;
    }

    function bindTopEvents() {
      app.querySelectorAll("[data-action='start-stage']").forEach((button) => {
        button.addEventListener("click", () => {
          const stage = Number(button.dataset.stage);
          pushHistory();
          state = createSampleData(stage, "corporate");
          state.screen = "editor";
          historyStack = [];
          futureStack = [];
          render();
        });
      });
      app.querySelector("[data-action='load-json']").addEventListener("click", () => fileInput.click());
      app.querySelector("[data-action='open-samples']").addEventListener("click", openSamplesModal);
      app.querySelector("[data-action='open-help']").addEventListener("click", openHelpModal);
    }

    function renderEditor() {
      const warnings = getWarnings();
      const counts = getCounts();
      app.innerHTML = `
        <div class="editor-shell stage-${state.stage}">
          <header class="editor-header">
            <div class="brand">
              <button class="logo" data-action="go-top" title="TOPへ戻る">${svgIcon("logo")}</button>
              <h1 class="brand-title">関係図整理ツール</h1>
            </div>
            <nav class="toolbar" aria-label="操作バー">
              <div class="toolbar-group">
                <button class="btn" data-action="new">${iconHtml("plus")}新規作成</button>
                <button class="btn" data-action="save-json">${iconHtml("save")}保存</button>
                <button class="btn" data-action="load-json">${iconHtml("folder")}読み込み</button>
                <button class="btn" data-action="export-json">${iconHtml("upload")}書き出し</button>
              </div>
              <div class="toolbar-group">
                <button class="btn" data-action="undo">Undo</button>
                <button class="btn" data-action="redo">Redo</button>
                <button class="btn" data-action="auto-arrange">${iconHtml("spark")}全体整列</button>
              </div>
              <div class="toolbar-group">
                <button class="btn ${state.viewMode === "simple" ? "ghost-orange" : ""}" data-action="view-simple">${iconHtml("clock")}かんたん表示</button>
                <button class="btn ${state.viewMode === "detail" ? "ghost-blue" : ""}" data-action="view-detail">${iconHtml("table")}詳細表示</button>
              </div>
              <div class="toolbar-group">
                <button class="btn" data-action="open-help">${iconHtml("help")}ヘルプ</button>
                <button class="btn ghost-purple" data-action="ai-mode" data-mode="consult">${iconHtml("spark")}AIに相談</button>
                <button class="btn ghost-pink" data-action="ai-mode" data-mode="scaffold">${iconHtml("spark")}AIにひな形を作ってもらう</button>
                <button class="btn ghost-blue" data-action="ai-mode" data-mode="final">${iconHtml("page")}完成品をAIに出力</button>
              </div>
            </nav>
            <div class="stage-badge">
              <div>
                <small>現在の段階:</small>
                <span class="stage-label">STEP${state.stage}</span>
              </div>
              <strong class="stage-title">${STAGE_NAMES[state.stage]}</strong>
            </div>
          </header>
          <main class="editor-main">
            ${renderLeftPanel()}
            ${renderCanvas()}
            ${renderRightPanel(warnings)}
          </main>
          <footer class="status-bar">
            <div class="status-left">
              <span>プロジェクト名:</span>
              <span class="project-name-inline">${escapeHtml(state.projectName || "未保存プロジェクト")} <button class="btn small icon-only" data-action="edit-project" title="プロジェクト名を変更">${iconHtml("text")}</button></span>
            </div>
            <div class="status-center">${renderInlineLegend()}</div>
            <div class="status-right">
              <span>要素数: ${counts.total}（ページ: ${counts.pages} / データ: ${counts.data} / 接続線: ${counts.edges}）</span>
              ${warnings.length ? `<span title="${escapeHtml(warnings.join("\n"))}">警告: ${warnings.length}</span>` : `<span>警告なし</span>`}
            </div>
          </footer>
        </div>
      `;
      bindEditorEvents();
      renderEdges();
    }

    function renderLeftPanel() {
      const canAdmin = state.stage >= 2;
      const canDb = state.stage >= 3;
      return `
        <aside class="side-panel">
          <div class="panel-scroll">
            <h2 class="panel-title">追加パネル</h2>
            <p class="panel-caption">ボタンで追加、または「ドラッグ作成」を選んでキャンバス上に箱を描けます。</p>
            <div class="tool-list">
              <button class="tool-btn orange" data-action="add-node" data-kind="publicPage">${iconHtml("page")}公開ページを追加</button>
              <button class="tool-btn blue" data-action="add-node" data-kind="adminPage" ${canAdmin ? "" : "disabled"}>${iconHtml("lock")}管理ページを追加</button>
              <button class="tool-btn orange" data-action="add-node" data-kind="modal">${iconHtml("modal")}モーダル / ポップアップを追加</button>
              <button class="tool-btn green" data-action="add-node" data-kind="saveData" ${canDb ? "" : "disabled"}>${iconHtml("db")}保存データ項目を追加</button>
              <button class="tool-btn green" data-action="add-node" data-kind="referenceData" ${canDb ? "" : "disabled"}>${iconHtml("db")}参照データ項目を追加</button>
              <button class="tool-btn purple ${state.connectMode ? "active" : ""}" data-action="toggle-connect">${iconHtml("link")}接続線を追加</button>
            </div>
            <div class="field">
              <label>接続線の種別</label>
              <select data-action="connection-type">
                <option value="navigate" ${state.connectionType === "navigate" ? "selected" : ""}>ページ遷移（ナビゲーション）</option>
                <option value="save" ${state.connectionType === "save" ? "selected" : ""}>保存（登録・更新）</option>
                <option value="reference" ${state.connectionType === "reference" ? "selected" : ""}>参照（読み込み）</option>
              </select>
            </div>
            <div class="field">
              <label>ドラッグ作成</label>
              <select data-action="draw-kind">
                <option value="">使わない</option>
                <option value="publicPage" ${state.drawKind === "publicPage" ? "selected" : ""}>公開ページ</option>
                <option value="adminPage" ${state.drawKind === "adminPage" ? "selected" : ""} ${canAdmin ? "" : "disabled"}>管理ページ</option>
                <option value="modal" ${state.drawKind === "modal" ? "selected" : ""}>モーダル</option>
                <option value="saveData" ${state.drawKind === "saveData" ? "selected" : ""} ${canDb ? "" : "disabled"}>保存データ</option>
                <option value="referenceData" ${state.drawKind === "referenceData" ? "selected" : ""} ${canDb ? "" : "disabled"}>参照データ</option>
              </select>
            </div>
            <div class="tool-card">
              <h3>導線（接続線）の凡例</h3>
              <p class="legend-item"><span class="legend-line navigate"></span>ページ遷移（リンク）</p>
              <p class="legend-item"><span class="legend-line save"></span>保存（登録・更新）</p>
              <p class="legend-item"><span class="legend-line reference"></span>参照（読み込み）</p>
            </div>
            <div class="tool-card">
              <h3>操作のヒント</h3>
              <ul>
                <li>要素をドラッグして位置を調整できます</li>
                <li>右下のつまみでサイズ変更できます</li>
                <li>接続線モードでは始点、終点の順にクリックします</li>
                <li>スペースキーを押しながらドラッグで画面を移動できます</li>
              </ul>
            </div>
            <div class="zoom-box">
              <button class="btn small icon-only" data-action="zoom-out">${iconHtml("zoomOut")}</button>
              <button class="btn small" data-action="zoom-reset"><span class="zoom-value">${Math.round(state.zoom * 100)}%</span></button>
              <button class="btn small icon-only" data-action="zoom-in">${iconHtml("zoomIn")}</button>
              <button class="btn small icon-only ${state.panTool ? "ghost-blue" : ""}" data-action="toggle-pan">${iconHtml("hand")}</button>
            </div>
          </div>
        </aside>
      `;
    }

    function renderCanvas() {
      return `
        <section class="canvas-panel">
          <div class="canvas-viewport ${state.panTool ? "panning" : ""}" data-canvas>
            <div class="workspace" style="transform: translate(${state.panX}px, ${state.panY}px) scale(${state.zoom});">
              ${renderAreas()}
              ${renderDbGroups()}
              ${renderDividers()}
              <svg class="edge-svg" data-edge-svg viewBox="0 0 ${WORKSPACE.width} ${WORKSPACE.height}">
                <defs>
                  <marker id="arrowNavigate" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                    <path d="M0,0 L0,6 L9,3 z" fill="${getComputedStyle(document.documentElement).getPropertyValue("--purple").trim() || "#7c4fd6"}"></path>
                  </marker>
                  <marker id="arrowSave" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                    <path d="M0,0 L0,6 L9,3 z" fill="#fb6f1f"></path>
                  </marker>
                  <marker id="arrowReference" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                    <path d="M0,0 L0,6 L9,3 z" fill="#2577d2"></path>
                  </marker>
                </defs>
              </svg>
              ${getVisibleNodes().map(renderNode).join("")}
            </div>
          </div>
        </section>
      `;
    }

    function renderAreas() {
      return Object.values(state.areas).map((area) => {
        const locked = (area.kind === "adminArea" && state.stage < 2) || (area.kind === "dbArea" && state.stage < 3);
        const icon = area.kind === "publicArea" ? "globe" : area.kind === "adminArea" ? "lock" : "db";
        const body = area.kind === "publicArea"
          ? "一般ユーザーに公開されるページを整理します"
          : area.kind === "adminArea"
            ? "管理者向けのページを整理します"
            : "データベースとの接続情報やテーブル関係を整理します";
        return `
          <section class="area ${area.kind}" style="left:${area.x}px; top:${area.y}px; width:${area.width}px; height:${area.height}px;">
            <div class="area-header">
              <span class="mini-icon">${svgIcon(icon)}</span>
              <div>
                <h2>${escapeHtml(area.title)}</h2>
                <p>${body}</p>
              </div>
            </div>
            ${locked ? renderLockedArea(area.kind) : ""}
          </section>
        `;
      }).join("");
    }

    function renderLockedArea(kind) {
      const message = kind === "adminArea"
        ? { title: "STEP2で開放されます", text: "公開ページの整理が完了したら、STEP2で管理ページの整理を行えるようになります。" }
        : { title: "STEP3で開放されます", text: "ページ整理が完了したら、STEP3でDB接続エリアを行えるようになります。" };
      return `
        <div class="locked-area">
          <div class="locked-area-inner">
            <div class="lock">${svgIcon(kind === "adminArea" ? "lock" : "db")}</div>
            <strong>${message.title}</strong>
            <p>${message.text}</p>
          </div>
        </div>
      `;
    }

    function renderDbGroups() {
      if (state.stage < 3) return "";
      const dbArea = state.areas.dbArea;
      const groupY = dbArea.y + 76;
      const groupH = dbArea.height - 96;
      const gap = 22;
      const groupW = (dbArea.width - 72 - gap) / 2;
      return `
        <div class="db-group" style="left:${dbArea.x + 24}px; top:${groupY}px; width:${groupW}px; height:${groupH}px;">
          <h3>保存データ（登録・更新されるデータ）</h3>
          <p>フォームや管理画面から登録・更新されるデータです。</p>
        </div>
        <div class="db-group" style="left:${dbArea.x + 48 + groupW}px; top:${groupY}px; width:${groupW}px; height:${groupH}px;">
          <h3>参照データ（読み込み専用のデータ）</h3>
          <p>ページ表示や選択肢などで参照するデータです。</p>
        </div>
      `;
    }

    function renderDividers() {
      const publicArea = state.areas.publicArea;
      const adminArea = state.areas.adminArea;
      const dbArea = state.areas.dbArea;
      const topY = Math.min(publicArea.y, adminArea.y) + 8;
      const topHeight = Math.max(publicArea.height, adminArea.height) - 16;
      return `
        <div class="area-divider vertical" data-divider="vertical"
          title="公開ページエリアと管理ページエリアの幅を調整"
          style="left:${adminArea.x - 20}px; top:${topY}px; height:${topHeight}px;"></div>
        <div class="area-divider horizontal" data-divider="horizontal"
          title="上段エリアとDB接続エリアの高さを調整"
          style="left:${dbArea.x + 8}px; top:${dbArea.y - 20}px; width:${dbArea.width - 16}px;"></div>
      `;
    }

    function renderNode(node) {
      const selected = state.selectedId === node.id;
      const source = state.connectFromId === node.id;
      const chips = getNodeChips(node);
      return `
        <article class="node ${node.kind} ${selected ? "selected" : ""} ${source ? "connect-source" : ""}"
          data-node-id="${node.id}"
          style="left:${node.x}px; top:${node.y}px; width:${node.width}px; height:${node.height}px;">
          <div class="node-inner">
            <div class="node-top">
              <span class="node-icon">${svgIcon(nodeIcon(node.kind, node.name))}</span>
              <div>
                <h3 class="node-title">${escapeHtml(node.name || KIND_LABELS[node.kind])}</h3>
                <div class="node-file">${escapeHtml(node.kind === "saveData" || node.kind === "referenceData" ? node.tableName || "table未設定" : node.htmlFile || "html未設定")}</div>
              </div>
              <span class="node-menu">::</span>
            </div>
            <p class="node-description">${escapeHtml(node.description || "説明を右パネルで入力できます。")}</p>
            ${state.viewMode === "detail" ? renderNodeDetail(node) : `<div class="node-tags">${chips.map((chip) => `<span class="node-chip">${escapeHtml(chip)}</span>`).join("")}</div>`}
          </div>
          <span class="resize-handle" data-resize-id="${node.id}"></span>
        </article>
      `;
    }

    function getNodeChips(node) {
      if (node.kind === "saveData" || node.kind === "referenceData") {
        const fields = node.fields?.length ? node.fields.slice(0, 5) : ["id", "..."];
        return fields;
      }
      const out = [];
      out.push(`${countEdgesFor(node.id, "from")}導線`);
      out.push(`CSS ${node.cssItems?.length || 0}`);
      out.push(`JS ${node.jsItems?.length || 0}`);
      const saveCount = state.edges.filter((edge) => edge.fromId === node.id && edge.relationType === "save").length;
      const refCount = state.edges.filter((edge) => edge.toId === node.id && edge.relationType === "reference").length;
      if (state.stage >= 3) out.push(`保存${saveCount}/参照${refCount}`);
      return out;
    }

    function renderNodeDetail(node) {
      if (node.kind === "saveData" || node.kind === "referenceData") {
        return `
          <div class="node-detail">
            <div><strong>テーブル:</strong> ${escapeHtml(node.tableName || "未設定")}</div>
            <div><strong>項目:</strong> ${escapeHtml((node.fields || []).slice(0, 5).join(", ") || "未設定")}</div>
            <div><strong>メモ:</strong> ${escapeHtml(node.notes || "なし")}</div>
          </div>
        `;
      }
      return `
        <div class="node-detail">
          <div><strong>html箱:</strong> ${escapeHtml(node.title || node.htmlFile || "未設定")}</div>
          <div><strong>CSS:</strong> ${escapeHtml((node.cssItems || []).map((item) => item.fileName).join(", ") || "CSS未登録")}</div>
          <div><strong>JS:</strong> ${escapeHtml((node.jsItems || []).map((item) => item.fileName).join(", ") || "JS未登録")}</div>
          <div><strong>リンク:</strong> ${escapeHtml(getEdgesFrom(node.id).map((edge) => edge.label).join(", ") || "未登録")}</div>
          <div><strong>DB:</strong> ${escapeHtml(getDbHints(node).join(", ") || "未登録")}</div>
          <div><strong>メモ:</strong> ${escapeHtml(node.notes || "なし")}</div>
        </div>
      `;
    }

    function countEdgesFor(nodeId, direction) {
      return state.edges.filter((edge) => direction === "from" ? edge.fromId === nodeId : edge.toId === nodeId).length;
    }

    function getEdgesFrom(nodeId) {
      return state.edges.filter((edge) => edge.fromId === nodeId);
    }

    function getDbHints(node) {
      const saveEdges = state.edges.filter((edge) => edge.fromId === node.id && edge.relationType === "save").map((edge) => getNode(edge.toId)?.name || edge.label);
      const refEdges = state.edges.filter((edge) => edge.toId === node.id && edge.relationType === "reference").map((edge) => getNode(edge.fromId)?.name || edge.label);
      return [...saveEdges.map((name) => `保存:${name}`), ...refEdges.map((name) => `参照:${name}`), ...(node.dbHints || [])];
    }

    function renderRightPanel(warnings) {
      const selectedNode = getNode(state.selectedId);
      const selectedEdge = state.edges.find((edge) => edge.id === state.selectedEdgeId);
      return `
        <aside class="right-panel">
          <div class="right-header">
            <h2>${selectedEdge ? "接続線詳細" : selectedNode ? "ページ詳細" : "詳細・出力パネル"}</h2>
            <button class="btn small" data-action="clear-selection">選択をクリア</button>
          </div>
          <div class="panel-scroll">
            ${selectedEdge ? renderEdgeForm(selectedEdge) : selectedNode ? renderNodeForm(selectedNode) : renderEmptyGuide()}
            ${warnings.length ? `<div class="warning-box"><strong>確認したい点</strong>${warnings.map((warning) => `<div>${escapeHtml(warning)}</div>`).join("")}</div>` : ""}
            ${renderAiPanel()}
          </div>
        </aside>
      `;
    }

    function renderEmptyGuide() {
      return `
        <div class="empty-guide">
          <strong>要素を選択してください</strong>
          <span>キャンバス上のページ、モーダル、DB項目、または接続線を選択すると、ここで詳細を編集できます。</span>
          <span>左の追加パネルから要素を増やし、接続線モードでつながりを整理してください。</span>
        </div>
      `;
    }

    function renderNodeForm(node) {
      const isDb = node.kind === "saveData" || node.kind === "referenceData";
      const pageOptions = state.nodes.filter((item) => isPageKind(item.kind) && item.id !== node.id)
        .map((item) => `<option value="${item.id}" ${node.linkedParentId === item.id ? "selected" : ""}>${escapeHtml(item.name)} (${escapeHtml(item.htmlFile || item.id)})</option>`).join("");
      return `
        <div class="form-section">
          <h3 class="form-title">${iconHtml(isDb ? "db" : "page")}${isDb ? "データ情報" : "ページ情報"}</h3>
          <div class="field">
            <label>種類</label>
            <select data-field="kind">
              <option value="publicPage" ${node.kind === "publicPage" ? "selected" : ""}>公開ページ</option>
              <option value="adminPage" ${node.kind === "adminPage" ? "selected" : ""}>管理ページ</option>
              <option value="modal" ${node.kind === "modal" ? "selected" : ""}>モーダル</option>
              <option value="popup" ${node.kind === "popup" ? "selected" : ""}>ポップアップ</option>
              <option value="saveData" ${node.kind === "saveData" ? "selected" : ""}>保存データ</option>
              <option value="referenceData" ${node.kind === "referenceData" ? "selected" : ""}>参照データ</option>
            </select>
          </div>
          <div class="field">
            <label>${isDb ? "データ項目名" : "名前"}</label>
            <input data-field="name" value="${escapeHtml(node.name)}" placeholder="例）トップページ">
          </div>
          ${isDb ? `
            <div class="field">
              <label>テーブル名</label>
              <input data-field="tableName" value="${escapeHtml(node.tableName)}" placeholder="例）contacts">
            </div>
          ` : `
            <div class="field">
              <label>htmlファイル名</label>
              <input data-field="htmlFile" value="${escapeHtml(node.htmlFile)}" placeholder="例）index.html">
            </div>
            <div class="field">
              <label>タイトル（title）</label>
              <input data-field="title" value="${escapeHtml(node.title)}" placeholder="例）株式会社〇〇 | トップページ">
            </div>
          `}
          <div class="field">
            <label>内容説明</label>
            <textarea data-field="description" placeholder="この要素の目的や内容を入力してください">${escapeHtml(node.description)}</textarea>
          </div>
          ${node.kind === "modal" || node.kind === "popup" ? `
            <div class="field">
              <label>親ページ</label>
              <select data-field="linkedParentId">
                <option value="">未設定</option>
                ${pageOptions}
              </select>
            </div>
          ` : ""}
        </div>
        <div class="form-section">
          <h3 class="form-title">${iconHtml("link")}リンク導線一覧</h3>
          <div class="field">
            <label>このページからのリンクや遷移先</label>
            <textarea data-field="linkHints" data-format="linkHints" placeholder="例）一覧へ -> node_id">${escapeHtml(linkHintsToLines(node.linkHints))}</textarea>
          </div>
        </div>
        ${isDb ? `
          <div class="form-section">
            <h3 class="form-title">${iconHtml("table")}DB項目</h3>
            <div class="field">
              <label>項目名（1行に1つ）</label>
              <textarea data-field="fields" data-format="field">${escapeHtml((node.fields || []).join("\n"))}</textarea>
            </div>
          </div>
        ` : `
          <div class="form-section">
            <h3 class="form-title">${iconHtml("table")}CSS一覧</h3>
            <div class="field">
              <label>CSS（file | label | role | common/specific）</label>
              <textarea data-field="cssItems" data-format="css">${escapeHtml(itemsToLines(node.cssItems))}</textarea>
            </div>
          </div>
          <div class="form-section">
            <h3 class="form-title">${iconHtml("table")}JS一覧</h3>
            <div class="field">
              <label>JS（file | label | role | common/specific）</label>
              <textarea data-field="jsItems" data-format="js">${escapeHtml(itemsToLines(node.jsItems))}</textarea>
            </div>
          </div>
        `}
        <div class="form-section">
          <h3 class="form-title">${iconHtml("text")}メモ</h3>
          <div class="field">
            <label>自由メモ</label>
            <textarea data-field="notes">${escapeHtml(node.notes)}</textarea>
          </div>
          <div class="field-grid">
            <button class="btn small" data-action="duplicate-selected">${iconHtml("copy")}複製</button>
            <button class="btn small" data-action="delete-selected">${iconHtml("trash")}削除</button>
          </div>
        </div>
      `;
    }

    function renderEdgeForm(edge) {
      return `
        <div class="form-section">
          <h3 class="form-title">${iconHtml("link")}接続情報</h3>
          <div class="field">
            <label>接続種別</label>
            <select data-edge-field="relationType">
              <option value="navigate" ${edge.relationType === "navigate" ? "selected" : ""}>ページ遷移</option>
              <option value="save" ${edge.relationType === "save" ? "selected" : ""}>保存</option>
              <option value="reference" ${edge.relationType === "reference" ? "selected" : ""}>参照</option>
            </select>
          </div>
          <div class="field">
            <label>ラベル</label>
            <input data-edge-field="label" value="${escapeHtml(edge.label)}" placeholder="例）一覧へ">
          </div>
          <div class="field">
            <label>説明</label>
            <textarea data-edge-field="description">${escapeHtml(edge.description)}</textarea>
          </div>
          <div class="field-grid">
            <button class="btn small" data-action="flip-edge">向きを反転</button>
            <button class="btn small" data-action="delete-selected">${iconHtml("trash")}削除</button>
          </div>
        </div>
      `;
    }

    function renderAiPanel() {
      const mode = state.aiMode || "consult";
      return `
        <section class="ai-card">
          <h3>${iconHtml("spark")}AIアシスト（いつでも利用できます）</h3>
          <div class="ai-tabs">
            <button class="btn small ghost-purple ai-tab ${mode === "consult" ? "active" : ""}" data-action="ai-mode" data-mode="consult">AIに相談</button>
            <button class="btn small ghost-pink ai-tab ${mode === "scaffold" ? "active" : ""}" data-action="ai-mode" data-mode="scaffold">AIにひな形を作ってもらう</button>
            <button class="btn small ghost-blue ai-tab ${mode === "final" ? "active" : ""}" data-action="ai-mode" data-mode="final">完成品をAIに出力</button>
          </div>
          <div class="field">
            <label>${mode === "consult" ? "相談内容" : mode === "scaffold" ? "作りたいもの" : "このあとやりたいこと"}</label>
            <textarea data-action="ai-input" placeholder="例）不足しているページや導線を確認したい">${escapeHtml(state.aiInput || "")}</textarea>
          </div>
          <div class="field-grid">
            <button class="btn small ghost-purple" data-action="generate-prompt">プロンプトを生成</button>
            <button class="btn small" data-action="clear-prompt">クリア</button>
          </div>
          <div class="field">
            <label>出力プレビュー</label>
            <div class="prompt-output">${escapeHtml(state.aiOutput || "ここに生成結果が表示されます。")}</div>
          </div>
          <div class="field-grid">
            <button class="btn small" data-action="copy-prompt">${iconHtml("copy")}コピー</button>
            <button class="btn small" data-action="download-prompt">${iconHtml("upload")}txt保存</button>
          </div>
        </section>
      `;
    }

    function renderInlineLegend() {
      return `
        <span class="legend-inline">
          <span class="legend-item"><span class="legend-line navigate"></span>ページ遷移</span>
          <span class="legend-item"><span class="legend-line save"></span>保存</span>
          <span class="legend-item"><span class="legend-line reference"></span>参照</span>
        </span>
      `;
    }

    function getCounts() {
      const nodes = getVisibleNodes();
      return {
        total: nodes.length,
        pages: nodes.filter((node) => isPageKind(node.kind)).length,
        data: nodes.filter((node) => node.kind === "saveData" || node.kind === "referenceData").length,
        edges: getVisibleEdges().length
      };
    }

    function renderEdges() {
      const svg = app.querySelector("[data-edge-svg]");
      if (!svg) return;
      const defs = svg.querySelector("defs")?.outerHTML || "";
      const edges = getVisibleEdges().map((edge) => {
        const from = getNode(edge.fromId);
        const to = getNode(edge.toId);
        if (!from || !to) return "";
        const a = centerOf(from);
        const b = centerOf(to);
        const dx = Math.max(80, Math.abs(b.x - a.x) * 0.5);
        const c1x = a.x + (b.x >= a.x ? dx : -dx);
        const c2x = b.x - (b.x >= a.x ? dx : -dx);
        const path = `M ${a.x} ${a.y} C ${c1x} ${a.y}, ${c2x} ${b.y}, ${b.x} ${b.y}`;
        const marker = edge.relationType === "save" ? "arrowSave" : edge.relationType === "reference" ? "arrowReference" : "arrowNavigate";
        const selected = state.selectedEdgeId === edge.id ? "selected" : "";
        const labelX = (a.x + b.x) / 2;
        const labelY = (a.y + b.y) / 2 - 8;
        return `
          <path class="edge-hit" data-edge-id="${edge.id}" d="${path}"></path>
          <path class="edge-line ${edge.relationType} ${selected}" d="${path}" marker-end="url(#${marker})"></path>
          <text class="edge-label" x="${labelX}" y="${labelY}">${escapeHtml(edge.label || RELATION_LABELS[edge.relationType])}</text>
        `;
      }).join("");
      svg.innerHTML = defs + edges;
      svg.querySelectorAll("[data-edge-id]").forEach((path) => {
        path.addEventListener("pointerdown", (event) => {
          event.stopPropagation();
          selectEdge(path.dataset.edgeId);
        });
      });
    }

    function bindEditorEvents() {
      app.querySelectorAll("[data-action]").forEach((el) => {
        const action = el.dataset.action;
        if (["ai-input", "connection-type", "draw-kind"].includes(action)) return;
        el.addEventListener("click", (event) => handleAction(event, action, el));
      });

      app.querySelector("[data-action='connection-type']")?.addEventListener("change", (event) => {
        state.connectionType = event.target.value;
      });

      app.querySelector("[data-action='draw-kind']")?.addEventListener("change", (event) => {
        state.drawKind = event.target.value || null;
        showToast(state.drawKind ? "キャンバス上をドラッグして箱を作成できます。" : "ドラッグ作成を解除しました。");
      });

      app.querySelector("[data-action='ai-input']")?.addEventListener("input", (event) => {
        state.aiInput = event.target.value;
      });

      app.querySelectorAll("[data-field]").forEach((field) => {
        field.addEventListener("change", () => updateSelectedNodeFromField(field));
      });

      app.querySelectorAll("[data-edge-field]").forEach((field) => {
        field.addEventListener("change", () => updateSelectedEdgeFromField(field));
      });

      app.querySelectorAll("[data-node-id]").forEach((nodeEl) => {
        nodeEl.addEventListener("pointerdown", startNodePointer);
        nodeEl.addEventListener("click", (event) => {
          event.stopPropagation();
          handleNodeClick(nodeEl.dataset.nodeId);
        });
      });

      app.querySelectorAll("[data-resize-id]").forEach((handle) => {
        handle.addEventListener("pointerdown", startResizePointer);
      });

      app.querySelectorAll("[data-divider]").forEach((divider) => {
        divider.addEventListener("pointerdown", startDividerPointer);
      });

      const viewport = app.querySelector("[data-canvas]");
      viewport?.addEventListener("pointerdown", startCanvasPointer);
      viewport?.addEventListener("wheel", handleWheel, { passive: false });
    }

    function handleAction(event, action, el) {
      event.preventDefault();
      const handlers = {
        "go-top": () => { state.screen = "top"; render(); },
        "new": () => newDocument(),
        "save-json": () => saveJson(),
        "export-json": () => saveJson(),
        "load-json": () => fileInput.click(),
        "undo": () => undo(),
        "redo": () => redo(),
        "auto-arrange": () => autoArrange(),
        "view-simple": () => setViewMode("simple"),
        "view-detail": () => setViewMode("detail"),
        "open-help": () => openHelpModal(),
        "add-node": () => addNode(el.dataset.kind),
        "toggle-connect": () => toggleConnectMode(),
        "zoom-in": () => updateZoom(0.1),
        "zoom-out": () => updateZoom(-0.1),
        "zoom-reset": () => resetZoom(),
        "toggle-pan": () => { state.panTool = !state.panTool; render(); },
        "clear-selection": () => clearSelection(),
        "delete-selected": () => deleteSelected(),
        "duplicate-selected": () => duplicateSelected(),
        "flip-edge": () => flipSelectedEdge(),
        "ai-mode": () => setAiMode(el.dataset.mode),
        "generate-prompt": () => generatePrompt(),
        "copy-prompt": () => copyPrompt(),
        "download-prompt": () => downloadPrompt(),
        "clear-prompt": () => { state.aiOutput = ""; lastGeneratedPrompt = ""; render(); },
        "edit-project": () => editProjectName()
      };
      handlers[action]?.();
    }

    function newDocument() {
      if (!window.confirm("現在の内容を閉じて、新規作成しますか？保存していない内容は失われます。")) return;
      historyStack = [];
      futureStack = [];
      state = createBaseState(state.stage);
      state.projectName = "新規プロジェクト";
      render();
    }

    function setViewMode(mode) {
      pushHistory();
      state.viewMode = mode;
      render();
    }

    function setAiMode(mode) {
      state.aiMode = mode;
      const rightPanel = app.querySelector(".right-panel");
      if (rightPanel) render();
    }

    function toggleConnectMode() {
      state.connectMode = !state.connectMode;
      state.connectFromId = null;
      state.drawKind = null;
      render();
      showToast(state.connectMode ? "接続元をクリックしてください。" : "接続線モードを解除しました。");
    }

    function clearSelection() {
      state.selectedId = null;
      state.selectedEdgeId = null;
      state.connectFromId = null;
      render();
    }

    function selectNode(id) {
      state.selectedId = id;
      state.selectedEdgeId = null;
      render();
    }

    function selectEdge(id) {
      state.selectedEdgeId = id;
      state.selectedId = null;
      render();
    }

    function handleNodeClick(id) {
      if (!state.connectMode) {
        selectNode(id);
        return;
      }
      if (!state.connectFromId) {
        state.connectFromId = id;
        state.selectedId = id;
        render();
        showToast("接続先をクリックしてください。");
        return;
      }
      if (state.connectFromId === id) {
        state.connectFromId = null;
        render();
        showToast("接続元を選び直してください。");
        return;
      }
      createEdge(state.connectFromId, id, state.connectionType);
    }

    function createEdge(fromId, toId, type) {
      const from = getNode(fromId);
      const to = getNode(toId);
      const allowed = edgeAllowed(from, to, type);
      if (!allowed.ok) {
        showToast(allowed.message);
        return;
      }
      pushHistory();
      state.edges.push({
        id: uid("edge"),
        fromId,
        toId,
        relationType: type,
        label: RELATION_LABELS[type],
        description: ""
      });
      state.connectFromId = null;
      state.selectedId = null;
      state.selectedEdgeId = state.edges[state.edges.length - 1].id;
      render();
      showToast("接続線を追加しました。");
    }

    function addNode(kind, rect) {
      if (kind === "adminPage" && state.stage < 2) return showToast("管理ページはSTEP2で追加できます。");
      if ((kind === "saveData" || kind === "referenceData") && state.stage < 3) return showToast("DB項目はSTEP3で追加できます。");
      pushHistory();
      const areaKind = inferAreaKind(kind);
      const area = state.areas[areaKind];
      const count = state.nodes.filter((node) => node.kind === kind).length + 1;
      const position = rect || nextNodePosition(area, count, kind);
      const selectedParent = getNode(state.selectedId);
      const isDb = kind === "saveData" || kind === "referenceData";
      const node = normalizeNode({
        id: uid(isDb ? "db" : "node"),
        kind,
        areaKind,
        linkedParentId: (kind === "modal" || kind === "popup") && selectedParent && isPageKind(selectedParent.kind) ? selectedParent.id : "",
        name: defaultNodeName(kind, count),
        htmlFile: defaultHtmlFile(kind, count),
        tableName: isDb ? defaultTableName(kind, count) : "",
        title: defaultNodeName(kind, count),
        description: defaultDescription(kind),
        notes: "",
        x: position.x,
        y: position.y,
        width: position.width,
        height: position.height,
        cssItems: isDb ? [] : defaultCss(kind),
        jsItems: isDb ? [] : defaultJs(kind),
        fields: isDb ? ["id", "name", "created_at"] : [],
        stageVisibleFrom: defaultStageForKind(kind)
      });
      state.nodes.push(node);
      state.selectedId = node.id;
      state.selectedEdgeId = null;
      state.drawKind = null;
      render();
      showToast(`${KIND_LABELS[kind]}を追加しました。`);
    }

    function nextNodePosition(area, count, kind) {
      const col = (count - 1) % 3;
      const row = Math.floor((count - 1) / 3);
      const db = kind === "saveData" || kind === "referenceData";
      return {
        x: area.x + 70 + col * (db ? 185 : 255),
        y: area.y + 100 + row * (db ? 172 : 148),
        width: db ? 170 : 238,
        height: db ? 150 : 126
      };
    }

    function defaultNodeName(kind, count) {
      const names = {
        publicPage: "新しい公開ページ",
        adminPage: "新しい管理ページ",
        modal: "新しいモーダル",
        popup: "新しいポップアップ",
        saveData: "保存データ項目",
        referenceData: "参照データ項目"
      };
      return `${names[kind] || "新しい要素"}${count}`;
    }

    function defaultHtmlFile(kind, count) {
      const map = {
        publicPage: `page-${count}.html`,
        adminPage: `admin/page-${count}.html`,
        modal: `modal-${count}.html`,
        popup: `popup-${count}.html`
      };
      return map[kind] || "";
    }

    function defaultTableName(kind, count) {
      return kind === "saveData" ? `save_table_${count}` : `reference_table_${count}`;
    }

    function defaultDescription(kind) {
      const map = {
        publicPage: "一般ユーザーが閲覧するページです。",
        adminPage: "管理者が操作するページです。",
        modal: "親ページから表示されるモーダルです。",
        popup: "親ページから表示されるポップアップです。",
        saveData: "登録・更新されるデータです。",
        referenceData: "表示や選択肢で参照されるデータです。"
      };
      return map[kind] || "";
    }

    function defaultCss(kind) {
      if (kind === "adminPage") return [{ id: uid("css"), kind: "css", fileName: "admin.css", label: "管理画面CSS", role: "管理ページ共通", scope: "common" }];
      if (kind === "modal" || kind === "popup") return [{ id: uid("css"), kind: "css", fileName: "modal.css", label: "モーダルCSS", role: "表示調整", scope: "specific" }];
      return [{ id: uid("css"), kind: "css", fileName: "common.css", label: "共通CSS", role: "ページ全体", scope: "common" }];
    }

    function defaultJs(kind) {
      if (kind === "adminPage") return [{ id: uid("js"), kind: "js", fileName: "admin.js", label: "管理画面JS", role: "管理操作", scope: "common" }];
      if (kind === "modal" || kind === "popup") return [{ id: uid("js"), kind: "js", fileName: "modal.js", label: "モーダルJS", role: "開閉動作", scope: "specific" }];
      return [{ id: uid("js"), kind: "js", fileName: "common.js", label: "共通JS", role: "共通動作", scope: "common" }];
    }

    function updateSelectedNodeFromField(field) {
      const node = getNode(state.selectedId);
      if (!node) return;
      pushHistory();
      const key = field.dataset.field;
      const format = field.dataset.format;
      if (format === "css") node[key] = linesToItems(field.value, "css");
      else if (format === "js") node[key] = linesToItems(field.value, "js");
      else if (format === "linkHints") node[key] = linesToLinkHints(field.value);
      else if (format === "field") node[key] = linesToItems(field.value, "field");
      else {
        node[key] = field.value;
        if (key === "kind") {
          node.areaKind = inferAreaKind(field.value);
          node.stageVisibleFrom = defaultStageForKind(field.value);
        }
      }
      state.meta.updatedAt = new Date().toISOString();
      render();
    }

    function updateSelectedEdgeFromField(field) {
      const edge = state.edges.find((item) => item.id === state.selectedEdgeId);
      if (!edge) return;
      pushHistory();
      edge[field.dataset.edgeField] = field.value;
      if (field.dataset.edgeField === "relationType" && !edge.label) edge.label = RELATION_LABELS[field.value];
      render();
    }

    function deleteSelected() {
      if (!state.selectedId && !state.selectedEdgeId) return showToast("削除する要素を選択してください。");
      pushHistory();
      if (state.selectedId) {
        const id = state.selectedId;
        state.nodes = state.nodes.filter((node) => node.id !== id);
        state.edges = state.edges.filter((edge) => edge.fromId !== id && edge.toId !== id);
        state.nodes.forEach((node) => {
          if (node.linkedParentId === id) node.linkedParentId = "";
        });
        state.selectedId = null;
      }
      if (state.selectedEdgeId) {
        state.edges = state.edges.filter((edge) => edge.id !== state.selectedEdgeId);
        state.selectedEdgeId = null;
      }
      render();
      showToast("選択中の要素を削除しました。");
    }

    function duplicateSelected() {
      const node = getNode(state.selectedId);
      if (!node) return showToast("複製する要素を選択してください。");
      pushHistory();
      const copy = deepClone(node);
      copy.id = uid(node.kind === "saveData" || node.kind === "referenceData" ? "db" : "node");
      copy.name = `${node.name} コピー`;
      copy.x += 32;
      copy.y += 32;
      copy.cssItems = (copy.cssItems || []).map((item) => ({ ...item, id: uid("css") }));
      copy.jsItems = (copy.jsItems || []).map((item) => ({ ...item, id: uid("js") }));
      state.nodes.push(copy);
      state.selectedId = copy.id;
      render();
      showToast("要素を複製しました。");
    }

    function flipSelectedEdge() {
      const edge = state.edges.find((item) => item.id === state.selectedEdgeId);
      if (!edge) return;
      pushHistory();
      [edge.fromId, edge.toId] = [edge.toId, edge.fromId];
      render();
    }

    function startNodePointer(event) {
      if (event.target.dataset.resizeId) return;
      const nodeEl = event.currentTarget;
      const node = getNode(nodeEl.dataset.nodeId);
      if (!node || state.connectMode) return;
      event.stopPropagation();
      pushHistory();
      dragState = {
        type: "node",
        id: node.id,
        startX: event.clientX,
        startY: event.clientY,
        originalX: node.x,
        originalY: node.y
      };
      nodeEl.setPointerCapture(event.pointerId);
      window.addEventListener("pointermove", handlePointerMove);
      window.addEventListener("pointerup", endPointerAction, { once: true });
    }

    function startResizePointer(event) {
      event.stopPropagation();
      const node = getNode(event.currentTarget.dataset.resizeId);
      if (!node) return;
      pushHistory();
      dragState = {
        type: "resize",
        id: node.id,
        startX: event.clientX,
        startY: event.clientY,
        originalWidth: node.width,
        originalHeight: node.height
      };
      event.currentTarget.setPointerCapture(event.pointerId);
      window.addEventListener("pointermove", handlePointerMove);
      window.addEventListener("pointerup", endPointerAction, { once: true });
    }

    function startDividerPointer(event) {
      event.stopPropagation();
      pushHistory();
      const publicArea = state.areas.publicArea;
      const adminArea = state.areas.adminArea;
      const dbArea = state.areas.dbArea;
      dragState = {
        type: "divider",
        axis: event.currentTarget.dataset.divider,
        startX: event.clientX,
        startY: event.clientY,
        publicWidth: publicArea.width,
        publicHeight: publicArea.height,
        adminX: adminArea.x,
        adminWidth: adminArea.width,
        adminHeight: adminArea.height,
        dbY: dbArea.y,
        dbHeight: dbArea.height,
        topRight: adminArea.x + adminArea.width
      };
      event.currentTarget.setPointerCapture(event.pointerId);
      window.addEventListener("pointermove", handlePointerMove);
      window.addEventListener("pointerup", endPointerAction, { once: true });
    }

    function startCanvasPointer(event) {
      if (event.target.closest("[data-node-id]") || event.target.closest("[data-edge-id]")) return;
      state.selectedId = null;
      state.selectedEdgeId = null;
      if (state.drawKind) {
        const point = canvasPoint(event);
        dragState = {
          type: "draw",
          kind: state.drawKind,
          startX: point.x,
          startY: point.y,
          currentX: point.x,
          currentY: point.y
        };
        createDrawPreview(point.x, point.y, 1, 1);
        window.addEventListener("pointermove", handlePointerMove);
        window.addEventListener("pointerup", endPointerAction, { once: true });
        return;
      }
      if (state.panTool || event.buttons === 1 && event.shiftKey) {
        dragState = {
          type: "pan",
          startX: event.clientX,
          startY: event.clientY,
          originalX: state.panX,
          originalY: state.panY
        };
        window.addEventListener("pointermove", handlePointerMove);
        window.addEventListener("pointerup", endPointerAction, { once: true });
        return;
      }
      render();
    }

    function handlePointerMove(event) {
      if (!dragState) return;
      if (dragState.type === "node") {
        const node = getNode(dragState.id);
        if (!node) return;
        node.x = Math.max(0, dragState.originalX + (event.clientX - dragState.startX) / state.zoom);
        node.y = Math.max(0, dragState.originalY + (event.clientY - dragState.startY) / state.zoom);
        updateNodeElement(node);
        renderEdges();
      } else if (dragState.type === "resize") {
        const node = getNode(dragState.id);
        if (!node) return;
        node.width = Math.max(150, dragState.originalWidth + (event.clientX - dragState.startX) / state.zoom);
        node.height = Math.max(96, dragState.originalHeight + (event.clientY - dragState.startY) / state.zoom);
        updateNodeElement(node);
        renderEdges();
      } else if (dragState.type === "pan") {
        state.panX = dragState.originalX + (event.clientX - dragState.startX);
        state.panY = dragState.originalY + (event.clientY - dragState.startY);
        updateWorkspaceTransform();
      } else if (dragState.type === "divider") {
        if (dragState.axis === "vertical") {
          const delta = (event.clientX - dragState.startX) / state.zoom;
          const newPublicWidth = clamp(dragState.publicWidth + delta, 420, 860);
          state.areas.publicArea.width = newPublicWidth;
          state.areas.adminArea.x = state.areas.publicArea.x + newPublicWidth + 24;
          state.areas.adminArea.width = Math.max(420, dragState.topRight - state.areas.adminArea.x);
        } else {
          const delta = (event.clientY - dragState.startY) / state.zoom;
          const newTopHeight = clamp(dragState.publicHeight + delta, 300, 560);
          state.areas.publicArea.height = newTopHeight;
          state.areas.adminArea.height = newTopHeight;
          state.areas.dbArea.y = state.areas.publicArea.y + newTopHeight + 28;
          state.areas.dbArea.height = Math.max(230, dragState.dbHeight - delta);
        }
        updateAreaElements();
      } else if (dragState.type === "draw") {
        const point = canvasPoint(event);
        dragState.currentX = point.x;
        dragState.currentY = point.y;
        const rect = normalizeRect(dragState.startX, dragState.startY, point.x, point.y);
        createDrawPreview(rect.x, rect.y, rect.width, rect.height);
      }
    }

    function endPointerAction() {
      if (dragState?.type === "draw") {
        const rect = normalizeRect(dragState.startX, dragState.startY, dragState.currentX, dragState.currentY);
        removeDrawPreview();
        if (rect.width > 80 && rect.height > 60) {
          addNode(dragState.kind, {
            x: rect.x,
            y: rect.y,
            width: Math.max(150, rect.width),
            height: Math.max(96, rect.height)
          });
        } else {
          showToast("箱を作るには少し大きめにドラッグしてください。");
        }
      } else if (dragState?.type === "node" || dragState?.type === "resize" || dragState?.type === "pan" || dragState?.type === "divider") {
        state.meta.updatedAt = new Date().toISOString();
        if (dragState.type === "divider") render();
      }
      dragState = null;
      window.removeEventListener("pointermove", handlePointerMove);
    }

    function updateAreaElements() {
      Object.values(state.areas).forEach((area) => {
        const el = app.querySelector(`.area.${area.kind}`);
        if (!el) return;
        el.style.left = `${area.x}px`;
        el.style.top = `${area.y}px`;
        el.style.width = `${area.width}px`;
        el.style.height = `${area.height}px`;
      });
      const vertical = app.querySelector('[data-divider="vertical"]');
      const horizontal = app.querySelector('[data-divider="horizontal"]');
      if (vertical) {
        const publicArea = state.areas.publicArea;
        const adminArea = state.areas.adminArea;
        vertical.style.left = `${adminArea.x - 20}px`;
        vertical.style.top = `${Math.min(publicArea.y, adminArea.y) + 8}px`;
        vertical.style.height = `${Math.max(publicArea.height, adminArea.height) - 16}px`;
      }
      if (horizontal) {
        const dbArea = state.areas.dbArea;
        horizontal.style.left = `${dbArea.x + 8}px`;
        horizontal.style.top = `${dbArea.y - 20}px`;
        horizontal.style.width = `${dbArea.width - 16}px`;
      }
    }

    function updateNodeElement(node) {
      const el = app.querySelector(`[data-node-id="${CSS.escape(node.id)}"]`);
      if (!el) return;
      el.style.left = `${node.x}px`;
      el.style.top = `${node.y}px`;
      el.style.width = `${node.width}px`;
      el.style.height = `${node.height}px`;
    }

    function updateWorkspaceTransform() {
      const workspace = app.querySelector(".workspace");
      if (workspace) workspace.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.zoom})`;
    }

    function handleWheel(event) {
      if (!event.ctrlKey && !event.metaKey) return;
      event.preventDefault();
      updateZoom(event.deltaY > 0 ? -0.05 : 0.05, false);
    }

    function updateZoom(delta, rerender = true) {
      state.zoom = Math.min(1.6, Math.max(0.55, Math.round((state.zoom + delta) * 100) / 100));
      if (rerender) render();
      else {
        updateWorkspaceTransform();
        const value = app.querySelector(".zoom-value");
        if (value) value.textContent = `${Math.round(state.zoom * 100)}%`;
      }
    }

    function resetZoom() {
      state.zoom = 1;
      state.panX = 0;
      state.panY = 0;
      render();
      showToast("100%表示に戻しました。");
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function autoArrange() {
      pushHistory();
      const areas = state.areas;
      const arrangePageArea = (areaKind) => {
        const area = areas[areaKind];
        const nodes = state.nodes.filter((node) => node.areaKind === areaKind && (node.stageVisibleFrom || 1) <= state.stage);
        nodes.forEach((node, index) => {
          const col = index % 3;
          const row = Math.floor(index / 3);
          node.x = area.x + 58 + col * 255;
          node.y = area.y + 88 + row * 148;
          node.width = 238;
          node.height = node.kind === "modal" || node.kind === "popup" ? 122 : 128;
        });
      };
      arrangePageArea("publicArea");
      if (state.stage >= 2) arrangePageArea("adminArea");
      if (state.stage >= 3) {
        const dbArea = areas.dbArea;
        const saveNodes = state.nodes.filter((node) => node.kind === "saveData" && (node.stageVisibleFrom || 1) <= state.stage);
        const referenceNodes = state.nodes.filter((node) => node.kind === "referenceData" && (node.stageVisibleFrom || 1) <= state.stage);
        saveNodes.forEach((node, index) => {
          node.x = dbArea.x + 58 + index * 178;
          node.y = dbArea.y + 170;
          node.width = 162;
          node.height = 174;
        });
        referenceNodes.forEach((node, index) => {
          node.x = dbArea.x + dbArea.width / 2 + 58 + index * 178;
          node.y = dbArea.y + 170;
          node.width = 162;
          node.height = 174;
        });
      }
      render();
      showToast("全体を整列しました。");
    }

    function canvasPoint(event) {
      const viewport = app.querySelector("[data-canvas]");
      const rect = viewport.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left - state.panX) / state.zoom,
        y: (event.clientY - rect.top - state.panY) / state.zoom
      };
    }

    function normalizeRect(x1, y1, x2, y2) {
      return {
        x: Math.min(x1, x2),
        y: Math.min(y1, y2),
        width: Math.abs(x2 - x1),
        height: Math.abs(y2 - y1)
      };
    }

    function createDrawPreview(x, y, width, height) {
      let preview = app.querySelector(".draw-preview");
      if (!preview) {
        preview = document.createElement("div");
        preview.className = "draw-preview";
        app.querySelector(".workspace")?.appendChild(preview);
      }
      preview.style.left = `${x}px`;
      preview.style.top = `${y}px`;
      preview.style.width = `${width}px`;
      preview.style.height = `${height}px`;
    }

    function removeDrawPreview() {
      app.querySelector(".draw-preview")?.remove();
    }

    function editProjectName() {
      const name = window.prompt("プロジェクト名を入力してください。", state.projectName || "");
      if (name === null) return;
      pushHistory();
      state.projectName = name.trim();
      render();
    }

    function saveJson() {
      state.meta.updatedAt = new Date().toISOString();
      const data = stripRuntimeState(state);
      downloadText(`${safeFileName(state.projectName || "relation-map")}.json`, JSON.stringify(data, null, 2), "application/json");
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (error) {
        // localStorage may be unavailable in restricted local contexts.
      }
      showToast("JSONを書き出しました。");
    }

    function downloadText(fileName, text, type = "text/plain") {
      const blob = new Blob([text], { type: `${type};charset=utf-8` });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = fileName;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    function safeFileName(value) {
      return String(value || "relation-map").replace(/[\\/:*?"<>|]+/g, "-").slice(0, 80);
    }

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        pushHistory();
        state = normalizeState(parsed);
        state.screen = "editor";
        render();
        showToast("保存データを読み込みました。");
      } catch (error) {
        showToast("JSONを読み込めませんでした。ファイル内容を確認してください。");
      } finally {
        fileInput.value = "";
      }
    });

    function generatePrompt() {
      state.aiInput = app.querySelector("[data-action='ai-input']")?.value || state.aiInput || "";
      const mode = state.aiMode || "consult";
      const template = selectPromptTemplate(mode);
      const prompt = template
        .replaceAll("{{SERIALIZED_STATE}}", serializeForAi())
        .replaceAll("{{USER_INPUT}}", state.aiInput || "未入力");
      state.aiOutput = prompt;
      lastGeneratedPrompt = prompt;
      render();
      showToast("AI用プロンプトを生成しました。");
    }

    function selectPromptTemplate(mode) {
      if (mode === "final") return promptTemplates.finalOutput;
      if (mode === "scaffold") return promptTemplates[`step${state.stage}Scaffold`];
      return promptTemplates[`step${state.stage}Consult`];
    }

    function serializeForAi() {
      const lines = [];
      lines.push("[APP]");
      lines.push(`name: ${APP_NAME}`);
      lines.push(`stage: STEP${state.stage} ${STAGE_NAMES[state.stage]}`);
      lines.push(`screen: ${state.screen}`);
      lines.push(`project_name: ${state.projectName || "未設定"}`);
      lines.push(`user_level: ${state.userLevel}`);
      lines.push(`view_mode: ${state.viewMode}`);
      lines.push("");
      lines.push("[AREAS]");
      Object.values(state.areas).forEach((area) => {
        lines.push(`- ${area.id}: ${area.title} (${area.x},${area.y},${area.width},${area.height})`);
      });
      lines.push("");
      lines.push("[NODES]");
      getVisibleNodes().forEach((node) => {
        lines.push(`- id: ${node.id}`);
        lines.push(`  kind: ${node.kind}`);
        lines.push(`  area_kind: ${node.areaKind}`);
        lines.push(`  name: ${node.name}`);
        if (isPageKind(node.kind)) {
          lines.push(`  html_file: ${node.htmlFile || "未設定"}`);
          lines.push(`  title: ${node.title || "未設定"}`);
          lines.push(`  description: ${node.description || "未設定"}`);
          lines.push(`  linked_parent_id: ${node.linkedParentId || "null"}`);
          lines.push("  css_items:");
          (node.cssItems || []).forEach((item) => lines.push(`    - ${item.fileName} | ${item.label} | ${item.role} | ${item.scope}`));
          if (!node.cssItems?.length) lines.push("    - CSS未登録");
          lines.push("  js_items:");
          (node.jsItems || []).forEach((item) => lines.push(`    - ${item.fileName} | ${item.label} | ${item.role} | ${item.scope}`));
          if (!node.jsItems?.length) lines.push("    - JS未登録");
          lines.push("  links:");
          getEdgesFrom(node.id).forEach((edge) => lines.push(`    - ${edge.label} -> ${edge.toId}`));
          if (!getEdgesFrom(node.id).length) lines.push("    - なし");
          lines.push(`  notes: ${node.notes || "なし"}`);
        } else {
          lines.push(`  table_name: ${node.tableName || "未設定"}`);
          lines.push(`  description: ${node.description || "未設定"}`);
          lines.push(`  fields: ${(node.fields || []).join(", ") || "未設定"}`);
        }
      });
      lines.push("");
      lines.push("[EDGES]");
      getVisibleEdges().forEach((edge) => {
        lines.push(`- ${edge.id} | ${edge.relationType} | ${edge.fromId} -> ${edge.toId} | ${edge.label || ""}`);
      });
      if (!getVisibleEdges().length) lines.push("- なし");
      lines.push("");
      lines.push("[WARNINGS]");
      const warnings = getWarnings();
      if (warnings.length) warnings.forEach((warning) => lines.push(`- ${warning}`));
      else lines.push("- なし");
      lines.push("");
      lines.push("[RAW_JSON]");
      lines.push(JSON.stringify(stripRuntimeState(state), null, 2));
      return lines.join("\n");
    }

    async function copyPrompt() {
      const text = lastGeneratedPrompt || state.aiOutput;
      if (!text) return showToast("コピーするプロンプトがありません。");
      try {
        await navigator.clipboard.writeText(text);
        showToast("プロンプトをコピーしました。");
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
        showToast("プロンプトをコピーしました。");
      }
    }

    function downloadPrompt() {
      const text = lastGeneratedPrompt || state.aiOutput;
      if (!text) return showToast("保存するプロンプトがありません。");
      downloadText(`${safeFileName(state.projectName || "ai-prompt")}-prompt.txt`, text, "text/plain");
      showToast("プロンプトをtxt保存しました。");
    }

    function pageNode(id, kind, areaKind, name, htmlFile, description, x, y, cssFiles, jsFiles, stageVisibleFrom, linkedParentId = "") {

    }

    function dbNode(id, kind, name, tableName, description, x, y, fields) {
      return {
        id,
        kind,
        areaKind: "dbArea",
        name,
        tableName,
        title: name,
        description,
        notes: "",
        x,
        y,
        width: 162,
        height: 174,
        fields,
        stageVisibleFrom: 3
      };
    }

    document.addEventListener("keydown", (event) => {
      const isMac = navigator.platform.toLowerCase().includes("mac");
      const mod = isMac ? event.metaKey : event.ctrlKey;
      if (mod && event.key.toLowerCase() === "s") {
        event.preventDefault();
        if (state.screen === "editor") saveJson();
      } else if (mod && event.key.toLowerCase() === "o") {
        event.preventDefault();
        fileInput.click();
      } else if (mod && event.key.toLowerCase() === "z" && event.shiftKey) {
        event.preventDefault();
        redo();
      } else if (mod && event.key.toLowerCase() === "z") {
        event.preventDefault();
        undo();
      } else if (event.key === "Delete" && state.screen === "editor") {
        deleteSelected();
      } else if (event.key === "Escape" && state.screen === "editor") {
        state.connectMode = false;
        state.connectFromId = null;
        state.drawKind = null;
        render();
      } else if (mod && event.key.toLowerCase() === "c" && state.selectedId) {
        const node = getNode(state.selectedId);
        if (node) clipboardNode = deepClone(node);
      } else if (mod && event.key.toLowerCase() === "v" && clipboardNode) {
        event.preventDefault();
        pushHistory();
        const copy = deepClone(clipboardNode);
        copy.id = uid(copy.kind === "saveData" || copy.kind === "referenceData" ? "db" : "node");
        copy.x += 40;
        copy.y += 40;
        copy.name = `${copy.name} コピー`;
        state.nodes.push(copy);
        state.selectedId = copy.id;
        render();
      }
    });

    render();
  </script>
</body>
</html>
